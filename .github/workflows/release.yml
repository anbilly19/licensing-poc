name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: onemachine-license-linux
            exe_name: onemachine-license
          - os: windows-latest
            artifact_name: onemachine-license-win.exe
            exe_name: onemachine-license.exe
          - os: macos-latest
            artifact_name: onemachine-license-mac
            exe_name: onemachine-license

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install dependencies (including nuitka)
        run: uv sync --locked --group dev

      # Linux: install patchelf required by Nuitka onefile
      - name: Install patchelf (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y patchelf

      - name: Build executable
        run: uv run python scripts/build_executables.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p release_artifacts
          cp dist/${{ matrix.exe_name }} release_artifacts/${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release_artifacts/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
          merge-multiple: true

      - name: Make Linux/macOS binaries executable
        run: |
          chmod +x release_artifacts/onemachine-license-linux || true
          chmod +x release_artifacts/onemachine-license-mac || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "OneMachine Licensing POC ${{ github.ref_name }}"
          body: |
            ## OneMachine Licensing POC ${{ github.ref_name }}

            > **No Python or uv required on client machines.** Download the binary, place two files next to it, run.

            ---

            ## Vendor setup — Laptop A (run once)

            **Linux/macOS**
            ```bash
            chmod +x onemachine-license-linux
            ./onemachine-license-linux keygen
            ```

            **Windows** (PowerShell or CMD)
            ```
            onemachine-license-win.exe keygen
            ```

            Outputs `private_key.pem` (keep secret) and `public_key.pem` (send to every client).

            ---

            ## Client setup — Laptops B & C

            ### Step 1 — Download the binary for your platform

            | Platform | File to download |
            |---|---|
            | Windows | `onemachine-license-win.exe` |
            | Linux   | `onemachine-license-linux` |
            | macOS   | `onemachine-license-mac` |

            ### Step 2 — Get your machine fingerprint

            **Windows** (PowerShell or CMD — no admin needed)
            ```
            onemachine-license-win.exe fingerprint
            ```

            **Linux/macOS**
            ```bash
            chmod +x onemachine-license-linux
            ./onemachine-license-linux fingerprint
            ```

            This prints a 64-char hex and saves `fingerprint.txt`. Send that to the vendor.

            ### Step 3 — Receive two files from the vendor

            Place these in the **same folder** as the executable:
            - `license.json` (rename from `license_<fp8>.json` the vendor sends)
            - `public_key.pem` (vendor sends this once)

            Your folder should look like:
            ```
            onemachine-license-win.exe   <- the binary
            license.json                 <- from vendor
            public_key.pem               <- from vendor
            ```

            ### Step 4 — Run the demo

            **Windows**
            ```
            onemachine-license-win.exe demo
            ```

            **Linux/macOS**
            ```bash
            ./onemachine-license-linux demo
            ```

            ---

            ## Vendor: issue a license for a client

            **Windows**
            ```
            onemachine-license-win.exe issue --fingerprint <64-char hex> --features rag_chat,transcriber --minutes 60
            ```

            **Linux/macOS**
            ```bash
            ./onemachine-license-linux issue --fingerprint <64-char hex> --features rag_chat,transcriber --minutes 60
            ```

            Outputs `license_<fp8>.json` — rename to `license.json` and send to the client.

            ---

            ## Demo commands (inside the REPL)

            | Command | Feature required |
            |---|---|
            | `rag` | `rag_chat` |
            | `transcribe` | `transcriber` |
            | `sql` | `nl_sql` |
            | `reports` | `reports` |
            | `info` | always available |
            | `quit` | always available |
          files: |
            release_artifacts/onemachine-license-linux
            release_artifacts/onemachine-license-win.exe
            release_artifacts/onemachine-license-mac
